# ══════════════════════════════════════════════════════════════════════════════
# Frontend CI/CD — Next.js Static Export → AWS S3 + CloudFront
# ══════════════════════════════════════════════════════════════════════════════
#
# Pipeline:  Lint → Build → Deploy to S3 + CloudFront
#
# Trigger:   push to main, pull_request to main, manual dispatch
# ══════════════════════════════════════════════════════════════════════════════

name: Frontend CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

# ─── Global env ───────────────────────────────────────────────────────────────
env:
  NODE_VERSION: "22.x"

permissions:
  contents: read

concurrency:
  group: "ci-${{ github.ref }}"
  cancel-in-progress: true

# ══════════════════════════════════════════════════════════════════════════════
jobs:
# ──────────────────────────────────────────────────────────────────────────────
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

# ──────────────────────────────────────────────────────────────────────────────
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js (static export)
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

      # Upload ./out as a reusable artifact for deploy job
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-out
          path: ./out
          retention-days: 1

# ──────────────────────────────────────────────────────────────────────────────
# DEPLOY TO AWS (S3 + CloudFront)
# ──────────────────────────────────────────────────────────────────────────────
  deploy-aws:
    name: 🚀 Deploy → AWS (S3 + CloudFront)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'

    environment:
      name: production

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: nextjs-out
          path: ./out

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Static assets (JS, CSS, images) → long-lived cache (1 year)
      - name: Sync static assets to S3
        run: |
          aws s3 sync ./out s3://${{ secrets.S3_BUCKET }} \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html" \
            --exclude "*.json"

      # HTML & JSON files → always revalidate
      - name: Sync HTML/JSON to S3
        run: |
          aws s3 sync ./out s3://${{ secrets.S3_BUCKET }} \
            --cache-control "public, no-cache, must-revalidate" \
            --include "*.html" \
            --include "*.json" \
            --exclude "*" \
            --include "*.html" \
            --include "*.json"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Verify deployment
        run: |
          echo "✅ Frontend deployed to S3 + CloudFront"
          echo "   Bucket: ${{ secrets.S3_BUCKET }}"
          echo "   Distribution: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}"
